
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenoSmart Beta</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f6;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.title{
text-align:center;
font-size:34px;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:40px;
}

.role-card{
background:white;
border-radius:12px;
padding:22px;
margin-bottom:16px;
cursor:pointer;
border:1px solid #e5e7eb;
transition:all .2s;
}

.role-card:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.page{
display:none;
}

button{
padding:10px 16px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
margin:10px 0;
width:100%;
}

</style>
</head>

<body>

<div class="container">

<div id="homePage" class="page" style="display:block">

<div class="title">RenoSmart</div>
<div class="subtitle">智能装修管理平台 · MY / SG</div>

<div class="role-card" onclick="selectRoleAndEnter('designer')">
<h3>室内设计师</h3>
<p>上传报价单 · AI分析 · 管理施工进度</p>
</div>

<div class="role-card" onclick="selectRoleAndEnter('owner')">
<h3>业主 / 甲方</h3>
<p>查看施工进度 · 检查工地照片</p>
</div>

<div class="role-card" onclick="selectRoleAndEnter('worker')">
<h3>工人 / 承包商</h3>
<p>查看任务 · 上传施工照片</p>
</div>

</div>

<div id="designerPage" class="page">

<h2>Designer Dashboard</h2>

<input type="file" id="quotationFile">
<button onclick="uploadAndParse()">上传并解析报价单</button>

<pre id="aiResult"></pre>

</div>

<div id="ownerPage" class="page">

<h2>Owner Dashboard</h2>
<p>这里将显示项目进度</p>

</div>

<div id="workerPage" class="page">

<h2>Worker Dashboard</h2>
<p>这里将显示施工任务</p>

</div>

</div>

<script>

/* ---------------------------
SUPABASE CONFIG (single declaration fix)
----------------------------*/

const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co"
const SUPABASE_ANON_KEY = "YOUR_PUBLIC_KEY"

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
)


/* ---------------------------
ROLE SELECTION FIX
----------------------------*/

function selectRoleAndEnter(role){

localStorage.setItem("renosmart_role",role)

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

if(role==="designer"){
document.getElementById("designerPage").style.display="block"
}

if(role==="owner"){
document.getElementById("ownerPage").style.display="block"
}

if(role==="worker"){
document.getElementById("workerPage").style.display="block"
}

}


/* ---------------------------
UPLOAD QUOTATION
----------------------------*/

async function uploadAndParse(){

const fileInput=document.getElementById("quotationFile")

if(!fileInput.files.length){
alert("请选择PDF文件")
return
}

const file=fileInput.files[0]

const text=await extractPDFText(file)

const result=await parseQuotation(text)

document.getElementById("aiResult").innerText=JSON.stringify(result,null,2)

}


/* ---------------------------
PDF TEXT EXTRACTION FIX
(read ALL pages)
----------------------------*/

async function extractPDFText(file){

const reader=new FileReader()

return new Promise(resolve=>{

reader.onload=async function(){

const typedarray=new Uint8Array(this.result)

const pdf=await pdfjsLib.getDocument(typedarray).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const content=await page.getTextContent()

const strings=content.items.map(item=>item.str).join(" ")

text+=strings+"\n"

}

resolve(text)

}

reader.readAsArrayBuffer(file)

})

}


/* ---------------------------
AI PARSER (Vercel proxy)
----------------------------*/

async function parseQuotation(text){

const prompt=`
Extract renovation quotation items.

Return JSON only.

Format:
[
{
item:"",
trade:"",
unit:"",
qty:0,
unit_price:0,
total_price:0
}
]

Text:
${text}
`

const response=await fetch("/api/claude",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
})

const data=await response.json()

try{
return JSON.parse(data.content[0].text)
}catch(e){
console.log("AI JSON parse error")
return data
}

}

</script>

</body>
</html>
